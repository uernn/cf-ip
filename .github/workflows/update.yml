name: Auto Update IP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */1 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run script
        run: python main.py

      - name: Commit files
        if: always()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add ipv4.txt debug_network.txt debug_text.txt debug_screenshot.png || true
          git commit -m "auto update ip and debug files" || echo "No changes"
          git push || true